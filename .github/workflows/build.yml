name: Build WinUI3 App

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  CONFIGURATION: 'Release'

jobs:
  build:
    runs-on: windows-2022
    strategy:
      matrix:
        platform: [x64]

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x
          9.0.x

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build
      run: |
        msbuild VocabApp\VocabApp.csproj /p:Configuration=${{ env.CONFIGURATION }} /p:Platform=${{ matrix.platform }} /p:TargetFramework=net8.0-windows10.0.19041.0 /t:Restore,Build

    - name: Publish
      run: |
        msbuild VocabApp\VocabApp.csproj /p:Configuration=${{ env.CONFIGURATION }} /p:Platform=${{ matrix.platform }} /p:TargetFramework=net8.0-windows10.0.19041.0 /p:WindowsPackageType=None /t:Publish /p:PublishDir=..\publish\${{ matrix.platform }}

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: VocabApp-${{ matrix.platform }}
        path: publish\${{ matrix.platform }}\**\*
        if-no-files-found: warn
        retention-days: 7