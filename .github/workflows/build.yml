name: Build WinUI3 App

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  CONFIGURATION: 'Release'

jobs:
  build:
    runs-on: windows-2022
    strategy:
      matrix:
        platform: [x64, x86, ARM64]

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet packages
      run: dotnet restore VocabApp\VocabApp.csproj -r win-${{ matrix.platform }}

    - name: Build
      run: |
        dotnet build VocabApp\VocabApp.csproj -c ${{ env.CONFIGURATION }} -r win-${{ matrix.platform }} --no-restore

    - name: Publish (non-MSIX)
      run: |
        dotnet publish VocabApp\VocabApp.csproj -c ${{ env.CONFIGURATION }} -r win-${{ matrix.platform }} --no-restore -p:WindowsPackageType=None -o publish\VocabApp-${{ matrix.platform }}

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: VocabApp-${{ matrix.platform }}
        path: publish\VocabApp-${{ matrix.platform }}\**\*
        if-no-files-found: warn
        retention-days: 7
